<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lesson 9</title>
    <link rel="stylesheet" href="./styles/normalize.css">
    <link rel="stylesheet" href="styles/fonts.css">
    <link rel="stylesheet" href="./styles/styles.css">
</head>
<body>
<main class="content">
    <div class="container main-content">
        <div class="sort">
            <nav class="sort-menu">
                <a class="active" href="#">All Plants</a>
                <a href="#">New Arrivals</a>
                <a href="#">Sale</a>
            </nav>
            <div class="sort-right">
                <a href="#"><span>Short by: Default sorting</span></a>
            </div>
        </div>
        <div class="cards">
            <div class="card">
                <div class="card-image">
                    <img src="./images/plant1.png" alt="plant1">
                </div>
                <div class="icons">
                    <a href="/card">
                        <img src="icons/shopping.svg" alt="Image">
                    </a>
                    <button type="button">
                        <img src="icons/heart.svg" alt="Image">
                    </button>
                    <button type="button">
                        <img src="icons/vector.svg" alt="Image">
                    </button>
                </div>
                <p class="card-title">Barberton Daisy</p>
                <p class="plant-price">$119.00</p>
            </div>
            <div class="card">
                <div class="card-image">
                    <img src="./images/plant2.png" alt="plant2">
                </div>
                <div class="icons">
                    <a href="/card">
                        <img src="icons/shopping.svg" alt="Image">
                    </a>
                    <button type="button">
                        <img src="icons/heart.svg" alt="Image">
                    </button>
                    <button type="button">
                        <img src="icons/vector.svg" alt="Image">
                    </button>
                </div>
                <p class="card-title">Angel Wing Begonia</p>
                <p class="plant-price">$169.00</p>
            </div>
            <div class="card">
                <div class="card-image">
                    <div class="sale">13% OFF</div>
                    <img src="./images/plant3.png" alt="plant3">
                </div>
                <div class="icons">
                    <a href="/card">
                        <img src="icons/shopping.svg" alt="Image">
                    </a>
                    <button type="button">
                        <img src="icons/heart.svg" alt="Image">
                    </button>
                    <button type="button">
                        <img src="icons/vector.svg" alt="Image">
                    </button>
                </div>
                <p class="card-title">African Violet</p>
                <p class="plant-price">$199.00</p>
            </div>
        </div>
    </div>
</main>
</body>
</html>
