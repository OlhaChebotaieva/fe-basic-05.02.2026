<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
    <div class="container content">
        <h1>Какая-то форма,<br>которая что-то делает:</h1>
        <form>
            <fieldset>
                <legend>Выберите один из вариантов</legend>
                <p>
                    <label class="custom-radio">
                        <input class="input" type="radio" name="radio" id="1">
                        <span class="radio"></span>
                        <span class="label">Первый</span>
                    </label>
                </p>
                <p>
                    <label class="custom-radio">
                        <input class="input" type="radio" name="radio" id="2">
                        <span class="radio"></span>
                        <span class="label">Второй</span>
                    </label>
                </p>
                <p>
                    <label class="custom-radio">
                        <input class="input" type="radio" name="radio" id="3">
                        <span class="radio"></span>
                        <span class="label">Третий</span>
                    </label>
                </p>
            </fieldset>
            <fieldset>
                <legend>Выберите дополнительные варианты</legend>
                <label class="custom-checkbox">
                    <input class="input" type="checkbox" name="checkbox" id="option1">
                    <span class="checkbox"></span>
                    <span class="label">Какой-то вариант ответа</span>
                </label>
                <label class="custom-checkbox">
                    <input class="input" type="checkbox" name="checkbox" id="option2">
                    <span class="checkbox2"></span>
                    <span class="label">Другой вариант ответа</span>
                </label >
                <label class="custom-checkbox">
                    <input class="input" type="checkbox" name="checkbox" id="option3">
                    <span class="checkbox3"></span>
                    <span class="label">Ещё вариант ответа</span>
                </label>
            </fieldset>
            <button class="button" type="submit">Send</button>
        </form>
    </div>
    <div class="container wrapper">
        <div class="card"></div>
        <div class="card-2"></div>
    </div>
</div>
</body>
</html>
